
project_id = "aakenoljsycyrcrchgxj"

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000", "https://app.indexa.digital"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.facebook]
enabled = false
client_id = ""
secret = ""
# Never forward these attributes to client URL, as they may contain the raw token (secret)
redirect_attributes = ["provider", "provider_client_id", "access_token", "expires_in", "refresh_token", "provider_token", "provider_refresh_token", "nonce"]

[auth.external.google]
enabled = true
client_id = ""
secret = ""
# Never forward these attributes to client URL, as they may contain the raw token (secret)
redirect_attributes = ["provider", "provider_client_id", "access_token", "expires_in", "refresh_token", "provider_token", "provider_refresh_token", "nonce"]

[functions]
[functions.process-payment]
verify_jwt = true
[functions.process-pix-payment]
verify_jwt = true
[functions.mercadopago-webhook]
verify_jwt = false
