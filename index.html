    <!-- Hard cache bust -->
    <script>
      (function() {
        var BUILD_ID = '__BUILD_ID__';
        var key = 'html-build-id';
        var stored = localStorage.getItem(key);
        if (stored && stored !== BUILD_ID) {
          localStorage.setItem(key, BUILD_ID);
          if ('caches' in window) {
            caches.keys().then(function(names) {
              return Promise.all(names.map(function(n) { return caches.delete(n); }));
            }).then(function() {
              window.location.href = window.location.pathname + '?_cb=' + Date.now();
            });
          } else {
            window.location.href = window.location.pathname + '?_cb=' + Date.now();
          }
          return;
        }
        if (!stored) {
          localStorage.setItem(key, BUILD_ID);
        }
      })();
    </script>

    <!-- Safari/iOS pre-load version check -->
    <script>
      (function() {
        var BUILD_ID = '__BUILD_ID__';
        if (sessionStorage.getItem('v-check-done')) return;
        fetch('https://aakenoljsycyrcrchgxj.supabase.co/functions/v1/get-app-version', {
          cache: 'no-store',
          headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.version && d.version !== '0' && d.version !== BUILD_ID) {
            sessionStorage.setItem('v-check-done', '1');
            localStorage.removeItem('html-build-id');
            localStorage.removeItem('app-version');
            if ('caches' in window) {
              caches.keys().then(function(n) {
                Promise.all(n.map(function(k) { return caches.delete(k); }))
                  .then(function() { location.replace('/?_r=' + Date.now()); });
              });
            } else {
              location.replace('/?_r=' + Date.now());
            }
          }
        })
        .catch(function() {});
      })();
    </script>
