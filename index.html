    <!-- 🚨 ERP SUBDOMAIN REDIRECT - Must run FIRST before anything else -->
    <script>
      (function() {
        var h = window.location.hostname;
        var p = window.location.pathname;
        if ((h === 'sistema.examidia.com.br' || h.indexOf('sistema.') === 0) && p.indexOf('/sistema') !== 0) {
          console.log('[SUBDOMAIN] Redirecionando para /sistema/login');
          window.location.replace('/sistema/login');
        }
      })();
    </script>
    
    <!-- 🧹 SW CLEANUP - Remove any cached Service Workers from previous PWA builds -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(n) { caches.delete(n); });
          });
        }
      }
    </script>

  <body>
    <div id="root"></div>
    
    <!-- 🔄 HARD CACHE BUST - Detect stale HTML and force reload -->
    <script>
      (function() {
        var BUILD_ID = '__BUILD_ID__';
        var key = 'html-build-id';
        var stored = localStorage.getItem(key);
        if (stored && stored !== BUILD_ID) {
          console.log('[CACHE-BUST] New build detected: ' + BUILD_ID + ' (was ' + stored + '). Reloading...');
          localStorage.setItem(key, BUILD_ID);
          if ('caches' in window) {
            caches.keys().then(function(names) {
              return Promise.all(names.map(function(n) { return caches.delete(n); }));
            }).then(function() {
              window.location.href = window.location.pathname + '?_cb=' + Date.now();
            });
          } else {
            window.location.href = window.location.pathname + '?_cb=' + Date.now();
          }
          return;
        }
        if (!stored) {
          localStorage.setItem(key, BUILD_ID);
        }
      })();
    </script>
    
    <!-- 🍎 SAFARI/iOS PRE-LOAD VERSION CHECK - runs before React bundle -->
    <script>
      (function() {
        var BUILD_ID = '__BUILD_ID__';
        if (sessionStorage.getItem('v-check-done')) return;
        fetch('https://aakenoljsycyrcrchgxj.supabase.co/functions/v1/get-app-version', {
          cache: 'no-store',
          headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.version && d.version !== '0' && d.version !== BUILD_ID) {
            console.log('[PRE-LOAD] New version: ' + d.version + ' (local: ' + BUILD_ID + '). Forcing reload...');
            sessionStorage.setItem('v-check-done', '1');
            localStorage.removeItem('html-build-id');
            localStorage.removeItem('app-version');
            if ('caches' in window) {
              caches.keys().then(function(n) {
                Promise.all(n.map(function(k) { return caches.delete(k); }))
                  .then(function() { location.replace('/?_r=' + Date.now()); });
              });
            } else {
              location.replace('/?_r=' + Date.now());
            }
          }
        })
        .catch(function() {});
      })();
    </script>
