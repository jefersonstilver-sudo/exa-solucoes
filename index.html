
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Segurança e Performance -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="no-referrer" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- CSP básico -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; img-src 'self' https: data: blob:; media-src 'self' https: blob:;" />
    
    <!-- SEO e Performance -->
    <title>Indexa - Marketing Digital e Produtora</title>
    <meta name="description" content="Soluções completas em marketing digital, produção audiovisual e painéis publicitários para empresas que querem crescer com estratégia e resultados reais." />
    <meta name="keywords" content="marketing digital, produtora, painéis publicitários, vídeos, campanhas" />
    <meta name="author" content="Indexa" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://indexa.com.br" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Indexa - Marketing Digital e Produtora" />
    <meta property="og:description" content="Soluções completas em marketing digital e produção audiovisual" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://indexa.com.br" />
    <meta property="og:image" content="https://indexa.com.br/og-image.jpg" />
    <meta property="og:locale" content="pt_BR" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Indexa - Marketing Digital e Produtora" />
    <meta name="twitter:description" content="Soluções completas em marketing digital e produção audiovisual" />
    <meta name="twitter:image" content="https://indexa.com.br/twitter-image.jpg" />
    
    <!-- Performance e PWA -->
    <meta name="theme-color" content="#4A0968" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Indexa" />
    
    <!-- Preload crítico -->
    <link rel="preload" href="/src/main.tsx" as="script" />
    <link rel="preload" href="/src/index.css" as="style" />
    
    <!-- Favicons otimizados -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- DNS Prefetch para recursos externos -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//supabase.co" />
    
    <!-- Fontes otimizadas com font-display: swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Prevenção de ataques -->
    <style>
      /* Anti-debugging CSS */
      body {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Permitir seleção em inputs */
      input, textarea, [contenteditable] {
        -webkit-user-select: text !important;
        -moz-user-select: text !important;
        -ms-user-select: text !important;
        user-select: text !important;
      }
      
      /* Loading otimizado */
      #root {
        min-height: 100vh;
        background: linear-gradient(145deg, #4A0968 0%, #6A1888 50%, #4A0968 100%);
      }
      
      /* Skeleton loader inline crítico */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(145deg, #4A0968 0%, #6A1888 50%, #4A0968 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-left: 3px solid #58E3AB;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="loader-spinner"></div>
      </div>
    </div>
    
    <!-- Scripts críticos -->
    <script>
      // Remove loader quando DOM carrega
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          const loader = document.querySelector('.initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s ease';
            setTimeout(() => loader.remove(), 300);
          }
        }, 100);
      });
      
      // Anti-debugging básico
      if (!window.location.href.includes('localhost') && !window.location.href.includes('127.0.0.1')) {
        // Detectar DevTools
        setInterval(function() {
          if (window.outerHeight - window.innerHeight > 200 || window.outerWidth - window.innerWidth > 200) {
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:#fff;font-family:monospace;">🔒 Acesso não autorizado</div>';
          }
        }, 1000);
      }
    </script>
    
    <!-- IMPORTANTE: NÃO REMOVER ESTE SCRIPT -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
